name: actions
author: yuiKitamura
description: actions

on:
  push:
  workflow_dispatch:

runs:
  using: composite
  steps:
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'maven'

    - name: Build with Maven
      shell: bash
      run: mvn clean package

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v7
      with:
        name: ksj2salvage-jar
        path: target/ksj2salvage-*.jar
        archive: 'false'